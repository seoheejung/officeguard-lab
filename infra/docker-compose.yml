services:
  # SecurityEvent 전달용 Kafka
  kafka:
    image: apache/kafka:4.1.2

    container_name: officeguard-lab-kafka

    # Host와 Kafka 외부 Listener 연결
    ports:
      - "9092:9092"

    # 단일 KRaft Broker 구성
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller

      KAFKA_LISTENERS: INTERNAL://:29092,EXTERNAL://:9092,CONTROLLER://:29093
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT

      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:29093

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0

    restart: unless-stopped

    # Kafka Topic 조회 가능 상태 확인
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list > /dev/null 2>&1"
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  # SecurityEvent 저장용 PostgreSQL
  postgres:
    image: postgres:17-alpine

    container_name: officeguard-lab-postgres

    # PostgreSQL 초기 Database와 관리자 계정 설정
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required}
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}

    # Host 공개 포트와 PostgreSQL 내부 포트 연결
    ports:
      - "${POSTGRES_PORT:?POSTGRES_PORT is required}:5432"

    # Database 데이터 영속화와 초기화 SQL 연결
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro

    restart: unless-stopped

    # PostgreSQL 연결 준비 상태 확인
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -h 127.0.0.1 -p 5432 -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  # OfficeGuard Lab Backend
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile

    container_name: officeguard-lab-backend

    # Backend 실행 환경 변수
    environment:
      NODE_ENV: ${NODE_ENV:?NODE_ENV is required}
      PORT: ${PORT:?PORT is required}
      MOCK_EVENT_INTERVAL_MS: ${MOCK_EVENT_INTERVAL_MS:?MOCK_EVENT_INTERVAL_MS is required}

      # Docker Network 내부 Kafka 연결 정보
      KAFKA_CLIENT_ID: ${KAFKA_CLIENT_ID:?KAFKA_CLIENT_ID is required}
      KAFKA_BROKERS: ${KAFKA_DOCKER_BROKERS:?KAFKA_DOCKER_BROKERS is required}
      KAFKA_SECURITY_EVENTS_TOPIC: ${KAFKA_SECURITY_EVENTS_TOPIC:?KAFKA_SECURITY_EVENTS_TOPIC is required}
      KAFKA_CONSUMER_GROUP_ID: ${KAFKA_CONSUMER_GROUP_ID:?KAFKA_CONSUMER_GROUP_ID is required}

      # Rule-based Analyzer 설정
      ANALYZER_LARGE_FILE_COPY_BYTES_THRESHOLD: ${ANALYZER_LARGE_FILE_COPY_BYTES_THRESHOLD:?ANALYZER_LARGE_FILE_COPY_BYTES_THRESHOLD is required}
      ANALYZER_USB_FILE_COPY_WINDOW_SECONDS: ${ANALYZER_USB_FILE_COPY_WINDOW_SECONDS:?ANALYZER_USB_FILE_COPY_WINDOW_SECONDS is required}
      ANALYZER_FILE_COPY_EXTERNAL_DOMAIN_WINDOW_SECONDS: ${ANALYZER_FILE_COPY_EXTERNAL_DOMAIN_WINDOW_SECONDS:?ANALYZER_FILE_COPY_EXTERNAL_DOMAIN_WINDOW_SECONDS is required}
      ANALYZER_DNS_SPIKE_WINDOW_SECONDS: ${ANALYZER_DNS_SPIKE_WINDOW_SECONDS:?ANALYZER_DNS_SPIKE_WINDOW_SECONDS is required}
      ANALYZER_DNS_SPIKE_THRESHOLD: ${ANALYZER_DNS_SPIKE_THRESHOLD:?ANALYZER_DNS_SPIKE_THRESHOLD is required}
      ANALYZER_EXTERNAL_DOMAINS: ${ANALYZER_EXTERNAL_DOMAINS:?ANALYZER_EXTERNAL_DOMAINS is required}

      # Docker Network 내부 PostgreSQL 연결 정보
      POSTGRES_HOST: ${POSTGRES_DOCKER_HOST:?POSTGRES_DOCKER_HOST is required}
      POSTGRES_PORT: "5432"
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required}
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}

    # Express 및 WebSocket 서버 포트 연결
    ports:
      - "${PORT:?PORT is required}:${PORT:?PORT is required}"

    # Kafka와 PostgreSQL 준비 완료 후 Backend 시작
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy

    restart: unless-stopped

    # Backend Health Check API 확인
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:' + process.env.PORT + '/health').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))"
        ]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s

  # OfficeGuard Lab Realtime Dashboard
  dashboard:
    build:
      context: ../dashboard
      dockerfile: Dockerfile

    container_name: officeguard-lab-dashboard

    # Dashboard 실행 및 Backend Proxy 환경 변수
    environment:
      DASHBOARD_PORT: ${DASHBOARD_PORT:?DASHBOARD_PORT is required}
      DASHBOARD_BACKEND_URL: ${DASHBOARD_DOCKER_BACKEND_URL:?DASHBOARD_DOCKER_BACKEND_URL is required}

    # Vite Dashboard 공개 포트 연결
    ports:
      - "${DASHBOARD_PORT:?DASHBOARD_PORT is required}:${DASHBOARD_PORT:?DASHBOARD_PORT is required}"

    # Backend 준비 완료 후 Dashboard 시작
    depends_on:
      backend:
        condition: service_healthy

    restart: unless-stopped

    # Vite Dashboard 응답 상태 확인
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:' + process.env.DASHBOARD_PORT).then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))"
        ]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

# PostgreSQL 데이터 영속화
volumes:
  postgres-data: